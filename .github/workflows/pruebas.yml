name: Pruebas unitarias
on:
  push:
    branches: [ main ]

jobs:
  job1:
    name: Pruebas
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v2
    - name: Configurar del entorno de Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'
    - name: Instalacion de librerias y dependencias
      run:  |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Correr pruebas
      id: correr-pruebas
      run: python -m unittest -v tests/test_persona.py
    - name: Calculo del cubrimiento
      id: cubrimiento
      run: |
        coverage run -m unittest -v tests/test_persona.py
        coverage report -m