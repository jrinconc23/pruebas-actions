name: Automerge
on:
  pull_request:
    types:
      - labeled
      - unlabeled
      - synchronize
      - opened
      - edited
      - ready_for_review
      - reopened
      - unlocked
    branches: [ main ]

jobs:
  job1:
    name: Pruebas
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v2
    - name: Configurar del entorno de Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'
    - name: Instalacion de librerias y dependencias
      run:  |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Correr pruebas
      run: python -m unittest -v tests/test_persona.py
    - name: Calculo del cubrimiento
      run: |  
        coverage run -m unittest -v tests/test_persona.py
        coverage report -m
  automerge:
    name: Automerge
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - id: automerge
        name: automerge
        uses: "pascalgn/automerge-action@v0.16.4"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
      - name: feedback
        if: ${{ steps.automerge.outputs.mergeResult == 'merged' }}
        run: |
          echo "Pull request ${{ steps.automerge.outputs.pullRequestNumber }} merged!"