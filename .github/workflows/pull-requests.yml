name: Automerge
on:
  pull_request:
    types:
      - labeled
      - unlabeled
      - synchronize
      - opened
      - edited
      - ready_for_review
      - reopened
      - unlocked
    branches: [ main ]

jobs:
  job1:
    name: Pruebas
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v2
    - name: Configurar del entorno de Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'
    - name: Instalacion de librerias y dependencias
      run:  |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Correr pruebas
      run: python -m unittest -v tests/test_persona.py
    - name: Calculo del cubrimiento
      run: |  
        coverage run -m unittest -v tests/test_persona.py
        coverage report -m
  automerge:
    name: Automerge
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: automerge
        uses: "pascalgn/automerge-action@4536e8847eb62fe2f0ee52c8fa92d17aa97f932f"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          MERGE_LABELS: ""